<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>📊 Stock Dashboard</h2>

<!-- <button onclick="loadData()">Load TCS Data</button> -->
<select id="stock1">
    <option value="TCS">TCS</option>
    <option value="INFY">INFY</option>
</select>

<select id="stock2">
    <option value="INFY">INFY</option>
    <option value="TCS">TCS</option>
</select>

<button onclick="compare()">Compare</button>

<canvas id="chart" width="800" height="400"></canvas>

<script>
async function compare() {
    const s1 = document.getElementById("stock1").value;
    const s2 = document.getElementById("stock2").value;

    const res = await fetch(`http://127.0.0.1:8000/compare?symbol1=${s1}&symbol2=${s2}`);
    const data = await res.json();

    const labels = data.symbol1.map(item => item.Date);

    const prices1 = data.symbol1.map(item => item.Close);
    const prices2 = data.symbol2.map(item => item.Close);

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {
                    label: s1,
                    data: prices1,
                    borderWidth: 2
                },
                {
                    label: s2,
                    data: prices2,
                    borderWidth: 2
                }
            ]
        }
    });
}
</script>

</body>
</html>
